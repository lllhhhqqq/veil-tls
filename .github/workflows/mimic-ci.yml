name: Mimic CI

on:
  push:
    branches: [main]
    tags: ["mimic-v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline:
    name: Verify BoringSSL Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check submodule pin
        shell: bash
        run: |
          set -euo pipefail
          expected="$(tr -d '\r\n' < btls-sys/boringssl-baseline.txt)"
          actual="$(git rev-parse HEAD:btls-sys/deps/boringssl)"
          if [ "$expected" != "$actual" ]; then
            echo "boringssl baseline mismatch"
            echo "expected: $expected"
            echo "actual:   $actual"
            exit 1
          fi

  test:
    name: Cargo Test
    runs-on: ubuntu-latest
    needs: baseline
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Test workspace
        run: cargo test --workspace
